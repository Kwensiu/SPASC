name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, without v prefix"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
            echo "Version must be in x.y.z format, with y and z between 0 and 99" >&2
            exit 1
          fi
          IFS=. read -r major minor patch <<< "$version"
          if (( minor > 99 || patch > 99 )); then
            echo "Version minor and patch must be between 0 and 99" >&2
            exit 1
          fi
          version_code=$((major * 10000 + minor * 100 + patch))
          echo "version_name=$version" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_KEYSTORE_BASE64}" ]]; then
            echo "Missing RELEASE_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          printf '%s' "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > release-keystore.jks

      - name: Validate signing secrets
        shell: bash
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${RELEASE_KEYSTORE_PASSWORD}" || { echo "Missing RELEASE_KEYSTORE_PASSWORD secret" >&2; exit 1; }
          test -n "${RELEASE_KEY_ALIAS}" || { echo "Missing RELEASE_KEY_ALIAS secret" >&2; exit 1; }
          test -n "${RELEASE_KEY_PASSWORD}" || { echo "Missing RELEASE_KEY_PASSWORD secret" >&2; exit 1; }

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: >
          ./gradlew clean assembleRelease
          -PversionName=${{ steps.version.outputs.version_name }}
          -PversionCode=${{ steps.version.outputs.version_code }}
          -PreleaseKeystore=${{ github.workspace }}/release-keystore.jks
          -PreleaseKeystorePassword="${RELEASE_KEYSTORE_PASSWORD}"
          -PreleaseKeyAlias="${RELEASE_KEY_ALIAS}"
          -PreleaseKeyPassword="${RELEASE_KEY_PASSWORD}"

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/SaltSplit-${{ steps.version.outputs.tag_name }}.apk"

      - name: Generate update manifest
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          version="${{ steps.version.outputs.version_name }}"
          tag="${{ steps.version.outputs.tag_name }}"
          apk_name="SaltSplit-${tag}.apk"
          apk_url="https://github.com/${repo}/releases/download/${tag}/${apk_name}"
          release_url="https://github.com/${repo}/releases/tag/${tag}"
          apk_sha256="$(sha256sum "release/${apk_name}" | awk '{print $1}')"
          cat > release/update.json <<EOF
          {
            "schemaVersion": 1,
            "packageName": "com.saltsplit.ks",
            "versionName": "${version}",
            "versionCode": ${{ steps.version.outputs.version_code }},
            "tagName": "${tag}",
            "apkName": "${apk_name}",
            "apkUrl": "${apk_url}",
            "apkSha256": "${apk_sha256}",
            "releaseUrl": "${release_url}"
          }
          EOF

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaltSplit-${{ steps.version.outputs.tag_name }}
          path: |
            release/SaltSplit-${{ steps.version.outputs.tag_name }}.apk
            release/update.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          files: |
            release/SaltSplit-${{ steps.version.outputs.tag_name }}.apk
            release/update.json
